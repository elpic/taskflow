name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(\d+\.\d+\.\d+)\"', f.read())
              print(m.group(1))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if tag exists
        if: steps.check.outputs.exists == 'true'
        run: echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."

      - name: Get commit message for release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          MSG=$(git log -1 --pretty=%s)
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

      - name: Set up uv and build wheel
        if: steps.check.outputs.exists == 'false'
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        if: steps.check.outputs.exists == 'false'
        run: uv build

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.notes.outputs.msg }}" \
            --latest \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
