name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Tag and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Get latest tag version
        id: current
        run: |
          TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$TAG" ]; then
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi
          echo "Latest tag: ${TAG:-none}"

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG=$(git log -1 --pretty=%s)
          AUTHOR=$(git log -1 --pretty=%an)
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

          # Skip version-sync commits from this workflow
          if [ "$AUTHOR" = "github-actions[bot]" ]; then
            echo "type=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$MSG" | grep -qiE '^feat(\(.*\))?!:|BREAKING CHANGE'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^feat(\(.*\))?:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qiE '^(fix|perf|refactor)(\(.*\))?:'; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        if: steps.bump.outputs.type != 'none'
        id: next
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.current.outputs.version }}"
          BUMP="${{ steps.bump.outputs.type }}"

          if [ "$BUMP" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$BUMP" = "patch" ]; then
            PATCH=$((PATCH + 1))
          fi

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bump: ${{ steps.current.outputs.version }} → $NEXT ($BUMP)"

      - name: Set up uv
        if: steps.bump.outputs.type != 'none'
        uses: astral-sh/setup-uv@v4

      - name: Build wheel
        if: steps.bump.outputs.type != 'none'
        run: uv build

      - name: Create tag and release
        if: steps.bump.outputs.type != 'none'
        run: |
          TAG="v${{ steps.next.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.bump.outputs.msg }}" \
            --latest \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version files
        if: steps.bump.outputs.type != 'none'
        run: |
          NEXT="${{ steps.next.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${NEXT}\"/" pyproject.toml
          python3 -c "
          import json
          with open('.claude-plugin/plugin.json') as f:
              data = json.load(f)
          data['version'] = '${NEXT}'
          with open('.claude-plugin/plugin.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Create version-sync PR
        id: version-pr
        if: steps.bump.outputs.type != 'none'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: sync version to ${{ steps.next.outputs.version }}"
          title: "chore: sync version to ${{ steps.next.outputs.version }}"
          body: "Auto-generated by release workflow after v${{ steps.next.outputs.version }} tag."
          branch: "chore/version-sync-${{ steps.next.outputs.version }}"
          delete-branch: true

      - name: Wait for CI and merge version-sync PR
        if: steps.version-pr.outputs.pull-request-number
        continue-on-error: true
        run: |
          PR=${{ steps.version-pr.outputs.pull-request-number }}
          echo "Waiting 30s for CI to start on PR #$PR..."
          sleep 30
          echo "Watching CI checks..."
          if gh pr checks "$PR" --watch --fail-fast; then
            echo "CI passed — merging"
            gh pr merge "$PR" --squash --delete-branch
          else
            echo "CI checks failed — skipping merge"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if no bump needed
        if: steps.bump.outputs.type == 'none'
        run: echo "No conventional commit prefix (feat/fix/perf/refactor) — skipping release."
